# Tuned cancel_timer function for the Extended OpenAI Conversation integration
# (jekalmin/extended_openai_conversation). Paste this into the conversation agent's
# `functions` field, alongside create_timer and stop_timer (Settings -> Voice
# assistants -> your assistant -> edit).
#
# This is what makes "cancel the pasta timer" work while the timer is still counting
# down (TM-10) — stop_timer only silences a timer that is already ringing. The model
# never has to know a uid: it passes the label the user said and the service resolves
# it against the active timers server-side (case-insensitive); with no label and no
# uid the service cancels the only active timer, so "cancel the timer" works too. The
# uid parameter exists for precision — create_timer returns it, and the system prompt
# lists active timers with their uids (see prompt-snippet.txt) — so an unlabeled
# timer among several can still be cancelled ("cancel my second timer").
#
# An unresolvable request (unknown label, several timers and no identifier) is
# rejected with the active-timer list in the error message, so the model can re-ask
# intelligently instead of guessing.
#
# response_variable is mandatory for the same reason as create_timer: the returned
# {success, cancelled, confirmation} is the model's only signal the cancel actually
# happened, and confirmation ("Pasta timer cancelled.") is ready to say verbatim.

- spec:
    name: cancel_timer
    description: >-
      Cancel a countdown timer that has NOT gone off yet ("cancel the pasta timer",
      "cancel my timer") so it never fires; it also silences a ringing timer. Pass
      the timer's name exactly as the user said it in label ("pasta" — never the
      word "timer" itself), or the uid from the active-timer list in the system
      prompt when the user identifies a timer some other way ("the second one",
      "the unnamed one"). With only one timer active you may omit both. If the
      service returns an error listing the active timers, ask the user which one
      they mean. The returned confirmation field is a ready-to-say sentence —
      repeat it back as-is.
    parameters:
      type: object
      properties:
        label:
          type: string
          description: The timer's name as the user said it ("pasta"), without the word "timer".
        uid:
          type: string
          description: Exact uid from the active-timer list, when the label alone can't identify it.
      required: []
  function:
    type: script
    sequence:
      - service: btoddb_ha_reminders.cancel_timer
        data:
          uid: "{{ uid }}"
          label: "{{ label }}"
        response_variable: _function_result
