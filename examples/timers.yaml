language: "en"
intents:
  HassStartTimer:
    data:
      - sentences:
          - "(set|start) a {timer_name:name} timer for {timer_seconds:seconds} second[s]"
          - "(set|start) a {timer_name:name} timer for {timer_minutes:minutes} minute[s]"
          - "(set|start) a {timer_name:name} timer for {timer_hours:hours} hour[s]"
lists:
  timer_name:
    wildcard: true
  timer_seconds:
    range:
      from: 1
      to: 100
  timer_minutes:
    range:
      from: 1
      to: 100
  timer_hours:
    range:
      from: 1
      to: 24
