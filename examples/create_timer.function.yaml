# Tuned create_timer function for the Extended OpenAI Conversation integration
# (jekalmin/extended_openai_conversation). Paste this into the conversation agent's
# `functions` field, alongside create_reminder and stop_timer (Settings -> Voice
# assistants -> your assistant -> edit).
#
# This is the voice path for countdown timers ("start a 5 minute timer") — the
# kitchen-timer counterpart of create_reminder. The component's create_timer service
# already exists; this function is what lets the agent call it.
#
# Why duration_seconds instead of a finish time: the component computes now + duration
# itself (TM-1), for the same reason relative reminders route through in_minutes
# (RM-4a) — small models are unreliable at clock arithmetic. The model only converts
# the spoken duration to seconds ("five and a half minutes" -> 330), nothing harder.
#
# Why device_id is a model parameter: EOC renders `current_device_id` — the device
# that heard the request — into the *system prompt* only; script functions receive
# just the model's arguments. So the prompt tells the model the current device id
# (see prompt-snippet.txt) and the model copies it into device_id, exactly the same
# bounded-copy job as person/zone entity_ids for location reminders (TM-2). When the
# request is typed (no satellite), device_id stays empty and the alarm falls back to
# a phone push (TM-7).
#
# Why response_variable is mandatory: identical to create_reminder (RM-9 / TM-3) —
# without the returned tool result the model has no signal the timer was started and
# guesses, confirming or denying non-deterministically. create_timer returns
# {success, message, finishes_at, confirmation}; confirmation is ready to say
# verbatim ("Pasta timer set for 5 minutes.").

- spec:
    name: create_timer
    description: >-
      Start a countdown timer ("start a 5 minute timer", "set a pasta timer for 8
      minutes") — an alarm that goes off after a duration, NOT a reminder at a clock
      time or place. When it reaches zero the alarm plays on the device that heard
      the request and repeats like a kitchen timer until the user says "stop timer".
      Convert the spoken duration to whole seconds for duration_seconds ("5 minutes"
      -> 300, "an hour and a half" -> 5400). If the user names the timer ("pasta
      timer"), pass just that name in label — never the word "timer" itself. Always
      pass the current device id (from the system prompt) as device_id so the alarm
      rings on the device the user spoke to; leave it empty only if no device id is
      listed. The returned confirmation field is a ready-to-say sentence — repeat it
      back as-is, don't reformat it.
    parameters:
      type: object
      properties:
        duration_seconds:
          type: integer
          description: How long the timer runs, in seconds (e.g. 300 for 5 minutes).
        label:
          type: string
          description: Optional short name for the timer ("pasta"), without the word "timer".
        device_id:
          type: string
          description: The current device id from the system prompt (the device that heard the request).
      required: [duration_seconds]
  function:
    type: script
    sequence:
      - service: btoddb_ha_reminders.create_timer
        data:
          duration_seconds: "{{ duration_seconds }}"
          label: "{{ label }}"
          device_id: "{{ device_id }}"
        response_variable: _function_result
