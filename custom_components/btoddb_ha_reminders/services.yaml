create:
  name: Create reminder
  description: >-
    Add a time-based reminder at an absolute time or a relative delay. Returns
    {success, message, start} where start is a spoken-language time string the
    conversation agent can echo back verbatim.
  fields:
    message:
      name: Message
      description: What to remind about, in the user's own words.
      required: true
      example: take out the trash
      selector:
        text:
    when:
      name: When
      description: >-
        Absolute ISO 8601 local datetime for a specific clock time or date
        ("at 6pm", "tomorrow at 9am", "next Tuesday"). Leave empty for relative
        delays and use in_minutes instead.
      required: false
      example: "2026-06-17T18:00:00"
      selector:
        text:
    in_minutes:
      name: In minutes
      description: >-
        Minutes from now, for relative delays ("in 5 minutes" -> 5, "in 2 hours"
        -> 120). Lets the home compute the absolute time. Takes priority over when
        when both are given.
      required: false
      example: 5
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: minutes

update:
  name: Update reminder
  description: >-
    Edit an existing time-based reminder by uid. Supply any combination of message,
    when, or in_minutes; at least one must be provided. Returns {success, message,
    start} where start is a spoken-language time string.
  fields:
    uid:
      name: UID
      description: The unique id of the reminder to update.
      required: true
      example: 1a2b3c4d
      selector:
        text:
    message:
      name: Message
      description: Replacement reminder text. Omit to leave unchanged.
      required: false
      example: take out the trash
      selector:
        text:
    when:
      name: When
      description: >-
        New absolute ISO 8601 local datetime. Omit to leave unchanged.
      required: false
      example: "2026-06-17T18:00:00"
      selector:
        text:
    in_minutes:
      name: In minutes
      description: >-
        New relative delay in minutes from now. Takes priority over when when both
        are given. Omit to leave unchanged.
      required: false
      example: 5
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: minutes

create_location:
  name: Create location reminder
  description: >-
    Add a reminder delivered the moment a person enters or leaves a Home Assistant
    zone. Fires once, then stays visible (crossed off) for 7 days.
  fields:
    message:
      name: Message
      description: What to remind about, in the user's own words.
      required: true
      example: grab the dry cleaning
      selector:
        text:
    person:
      name: Person
      description: The person entity whose location triggers the reminder.
      required: true
      example: person.todd
      selector:
        entity:
          domain: person
    zone:
      name: Zone
      description: The zone to watch.
      required: true
      example: zone.work
      selector:
        entity:
          domain: zone
    trigger:
      name: Trigger
      description: Deliver when the person enters the zone, or when they leave it.
      required: true
      example: enter
      selector:
        select:
          options:
            - enter
            - leave

update_location:
  name: Update location reminder
  description: >-
    Edit an existing location reminder by uid. Supply any combination of message,
    person, zone, or trigger; at least one must be provided.
  fields:
    uid:
      name: UID
      description: The unique id of the location reminder to update.
      required: true
      example: 1a2b3c4d
      selector:
        text:
    message:
      name: Message
      description: Replacement reminder text. Omit to leave unchanged.
      required: false
      example: grab the dry cleaning
      selector:
        text:
    person:
      name: Person
      description: Replacement person entity. Omit to leave unchanged.
      required: false
      example: person.todd
      selector:
        entity:
          domain: person
    zone:
      name: Zone
      description: Replacement zone entity. Omit to leave unchanged.
      required: false
      example: zone.work
      selector:
        entity:
          domain: zone
    trigger:
      name: Trigger
      description: Replacement trigger (enter or leave). Omit to leave unchanged.
      required: false
      example: enter
      selector:
        select:
          options:
            - enter
            - leave

delete_location:
  name: Delete location reminder
  description: Remove a location reminder by its unique id.
  fields:
    uid:
      name: UID
      description: The unique id of the location reminder to delete.
      required: true
      example: 1a2b3c4d
      selector:
        text:
