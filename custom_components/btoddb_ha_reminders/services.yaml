create:
  name: Create reminder
  description: >-
    Add a time-based reminder at an absolute time, a relative delay, or a recurring
    daily/weekly/monthly schedule. Returns {success, message, start, confirmation}
    where confirmation is a ready-to-say sentence the conversation agent can echo
    back verbatim.

    For recurring requests such as "every day at 2 PM", set when to the first
    desired occurrence and set rrule to "FREQ=DAILY". For weekly requests, set
    rrule to "FREQ=WEEKLY;BYDAY=MO" with the requested weekday.

    For monthly requests, set when to the first desired occurrence and rrule to
    one of: "FREQ=MONTHLY;BYMONTHDAY=15" (a fixed day 1-28), "FREQ=MONTHLY;
    BYMONTHDAY=-1" ("last day of the month" — covers 28/29/30/31 however many
    days that month has), or "FREQ=MONTHLY;BYDAY=1FR" ("first Friday" — use
    1/2/3/4 for first/second/third/fourth, or -1 for "last", followed by MO/TU/
    WE/TH/FR/SA/SU). "when" must already land on the requested day (e.g. the
    first Friday of its month for BYDAY=1FR, or the actual last day of its
    month for BYMONTHDAY=-1) — the service rejects a mismatch. A fixed
    BYMONTHDAY of 29, 30, or 31 is rejected (not every month has that day); use
    BYMONTHDAY=-1 instead.

    For "every N weeks/days/months" cadences, add INTERVAL=N: "every week" ->
    omit INTERVAL (or INTERVAL=1), "every other week" -> INTERVAL=2, "every
    third week" -> INTERVAL=3, "every fourth week" -> INTERVAL=4, etc. Same
    mapping applies to FREQ=DAILY ("every other day" -> INTERVAL=2, ...) and
    FREQ=MONTHLY ("quarterly"/"every 3 months" -> INTERVAL=3, ...).
  fields:
    message:
      name: Message
      description: What to remind about, in the user's own words.
      required: true
      example: take out the trash
      selector:
        text:
    when:
      name: When
      description: >-
        Absolute ISO 8601 local datetime for a specific clock time or date
        ("at 6pm", "tomorrow at 9am", "next Tuesday"). Leave empty for relative
        delays and use in_minutes instead.
      required: false
      example: "2026-06-17T18:00:00"
      selector:
        text:
    in_minutes:
      name: In minutes
      description: >-
        Minutes from now, for relative delays ("in 5 minutes" -> 5, "in 2 hours"
        -> 120). Lets the home compute the absolute time. Takes priority over when
        when both are given.
      required: false
      example: 5
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: minutes
    rrule:
      name: Recurrence rule
      description: >-
        iCalendar RRULE string for recurring reminders. Supported values:
        "FREQ=DAILY" (fires every day at the same time), "FREQ=WEEKLY;BYDAY=MO"
        (fires every week on the same day — replace MO with TU/WE/TH/FR/SA/SU
        for other weekdays), "FREQ=MONTHLY;BYMONTHDAY=15" (fires on the same
        day of the month, 1-28), "FREQ=MONTHLY;BYMONTHDAY=-1" (fires on the
        last day of the month, whatever that day is), or "FREQ=MONTHLY;
        BYDAY=1FR" (fires on an ordinal weekday — 1/2/3/4 for first/second/
        third/fourth, or -1 for last, followed by MO/TU/WE/TH/FR/SA/SU). Add
        ";INTERVAL=N" to skip weeks/days/months: INTERVAL=1 (or omitted) means
        every week/day/month, INTERVAL=2 means every other, INTERVAL=3 means
        every third, and so on — map "every other week" to INTERVAL=2, "every
        third week" to INTERVAL=3, "every fourth week" to INTERVAL=4,
        "quarterly" to "FREQ=MONTHLY;INTERVAL=3", etc. Set "when" to the first
        desired occurrence — it must already land on the requested day (e.g.
        the first Friday of its month for BYDAY=1FR); after each delivery the
        next occurrence is scheduled automatically.
      required: false
      example: "FREQ=DAILY"
      selector:
        text:

update:
  name: Update reminder
  description: >-
    Edit an existing time-based reminder by uid. Supply any combination of message,
    when, in_minutes, or rrule; at least one must be provided. Returns {success,
    message, start, confirmation} where confirmation is a ready-to-say sentence
    the conversation agent can echo back verbatim.
  fields:
    uid:
      name: UID
      description: The unique id of the reminder to update.
      required: true
      example: 1a2b3c4d
      selector:
        text:
    message:
      name: Message
      description: Replacement reminder text. Omit to leave unchanged.
      required: false
      example: take out the trash
      selector:
        text:
    when:
      name: When
      description: >-
        New absolute ISO 8601 local datetime. Omit to leave unchanged.
      required: false
      example: "2026-06-17T18:00:00"
      selector:
        text:
    in_minutes:
      name: In minutes
      description: >-
        New relative delay in minutes from now. Takes priority over when when both
        are given. Omit to leave unchanged.
      required: false
      example: 5
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: minutes
    rrule:
      name: Recurrence rule
      description: >-
        New RRULE for this reminder ("FREQ=DAILY", "FREQ=WEEKLY;BYDAY=MO",
        "FREQ=MONTHLY;BYMONTHDAY=15", "FREQ=MONTHLY;BYMONTHDAY=-1" for the
        last day, "FREQ=MONTHLY;BYDAY=1FR" for an ordinal weekday, etc.). Add
        ";INTERVAL=N" for "every other"/"every Nth" week, day, or month
        cadences (INTERVAL=2 -> every other, INTERVAL=3 -> every third, etc.).
        Pass an empty string or null to convert a recurring reminder back to a
        one-shot. Omit to leave the recurrence unchanged.
      required: false
      example: "FREQ=WEEKLY;BYDAY=MO"
      selector:
        text:

snooze:
  name: Snooze reminder
  description: >-
    Reschedule a time-based reminder to fire again after a delay. Creates a new
    one-shot copy of the original reminder set to fire in the given number of minutes.
    The original recurring series (if any) is unaffected (RM-11).
  fields:
    uid:
      name: UID
      description: The unique id of the reminder to snooze.
      required: true
      example: 1a2b3c4d
      selector:
        text:
    minutes:
      name: Minutes
      description: How many minutes to delay the re-delivery.
      required: true
      example: 15
      selector:
        number:
          min: 1
          mode: box
          unit_of_measurement: minutes

create_location:
  name: Create location reminder
  description: >-
    Add a reminder delivered the moment a person enters or leaves a Home Assistant
    zone. One-shot by default (fires once, then stays visible for 7 days). Set
    persistent to true to re-fire on every matching transition instead.

    Word order does not matter — "When I arrive at X, remind me to Y" and "Remind
    me to Y when I arrive at X" are identical requests. In both cases, set message
    to only the reminder content ("Y") and strip the location clause entirely — do
    not include phrases like "when I arrive at X" or "when I leave X" in message.

    Pass the spoken place name directly in the zone field and let the integration
    match it to the nearest configured zone — do not over-confirm near-misses or
    ask the user to clarify unless the service itself returns an error.
  fields:
    message:
      name: Message
      description: >-
        What to remind about, in the user's own words. Do NOT include the
        location or trigger clause ("when I arrive at X", "when I leave Y") — that
        information belongs in the zone and trigger fields.
      required: true
      example: order a wooden ship
      selector:
        text:
    person:
      name: Person
      description: The person entity whose location triggers the reminder.
      required: true
      example: person.todd
      selector:
        entity:
          domain: person
    zone:
      name: Zone
      description: >-
        The place name or zone entity_id to watch. Pass the spoken place name
        exactly as the user said it (e.g. "Bruciato", "Docks Marina Grill",
        "Agate") — the integration fuzzy-matches it to the nearest configured
        zone. Do not over-confirm or ask the user to clarify a near-miss; pass the
        name through and the integration will resolve it or return an error with
        available zone names.
      required: true
      example: Bruciato
      selector:
        text:
    trigger:
      name: Trigger
      description: Deliver when the person enters the zone, or when they leave it.
      required: true
      example: enter
      selector:
        select:
          options:
            - enter
            - leave
    persistent:
      name: Persistent
      description: >-
        When true, the reminder re-fires on every matching zone transition instead
        of firing once. It stays active until explicitly deleted.
      required: false
      default: false
      selector:
        boolean:

update_location:
  name: Update location reminder
  description: >-
    Edit an existing location reminder by uid. Supply any combination of message,
    person, zone, trigger, or persistent; at least one must be provided.
  fields:
    uid:
      name: UID
      description: The unique id of the location reminder to update.
      required: true
      example: 1a2b3c4d
      selector:
        text:
    message:
      name: Message
      description: Replacement reminder text. Omit to leave unchanged.
      required: false
      example: grab the dry cleaning
      selector:
        text:
    person:
      name: Person
      description: Replacement person entity. Omit to leave unchanged.
      required: false
      example: person.todd
      selector:
        entity:
          domain: person
    zone:
      name: Zone
      description: >-
        Replacement place name or zone entity_id. Pass the spoken place name
        directly — the integration fuzzy-matches it. Omit to leave unchanged.
      required: false
      example: Bruciato
      selector:
        text:
    trigger:
      name: Trigger
      description: Replacement trigger (enter or leave). Omit to leave unchanged.
      required: false
      example: enter
      selector:
        select:
          options:
            - enter
            - leave
    persistent:
      name: Persistent
      description: >-
        Change whether this reminder re-fires on every transition (true) or fires
        only once (false). Omit to leave unchanged.
      required: false
      selector:
        boolean:

delete_location:
  name: Delete location reminder
  description: Remove a location reminder by its unique id.
  fields:
    uid:
      name: UID
      description: The unique id of the location reminder to delete.
      required: true
      example: 1a2b3c4d
      selector:
        text:

create_timer:
  name: Create timer
  description: >-
    Start a countdown timer ("start a 5 minute timer"). When it reaches zero, the
    alarm plays on the device that heard the request and repeats like a kitchen
    timer until stopped or cancelled; with no device it falls back to a phone
    push. Returns {success, uid, message, finishes_at, confirmation} where
    confirmation is a ready-to-say sentence the conversation agent can echo back
    verbatim and uid identifies the timer for cancel_timer / stop_timer.
  fields:
    duration_seconds:
      name: Duration
      description: >-
        How long the timer runs, in seconds ("5 minutes" -> 300, "an hour and a
        half" -> 5400). The component computes the finish time itself.
      required: true
      example: 300
      selector:
        number:
          min: 1
          mode: box
          unit_of_measurement: seconds
    label:
      name: Label
      description: >-
        Optional short name for the timer ("pasta"), spoken back when it goes off
        ("Your pasta timer is done").
      required: false
      example: pasta
      selector:
        text:
    device_id:
      name: Device
      description: >-
        The device that should play the alarm — normally the voice satellite that
        heard the request. Omit to deliver the alarm as a phone push instead.
      required: false
      selector:
        device:
          entity:
            - domain: assist_satellite

stop_timer:
  name: Stop timer
  description: >-
    Silence a timer that is going off ("stop timer"). With a uid, stops exactly
    that timer; otherwise stops the nagging timer(s) for the given device, or
    every nagging timer when no device is given. Stopping completes the timer; it
    does not affect other pending timers. Returns {success, stopped, confirmation}.
  fields:
    uid:
      name: UID
      description: The unique id of the timer to stop. Omit to stop by device.
      required: false
      example: 1a2b3c4d
      selector:
        text:
    device_id:
      name: Device
      description: >-
        The device whose nagging timer(s) to stop — normally the voice satellite
        that heard "stop timer". Omit to stop every nagging timer.
      required: false
      selector:
        device:
          entity:
            - domain: assist_satellite

cancel_timer:
  name: Cancel timer
  description: >-
    Cancel a timer before or after it reaches zero. A pending timer never fires; a
    nagging timer is silenced (same as stop_timer). Identify the timer by uid, by
    its label ("pasta" cancels every active pasta timer), or by nothing at all when
    exactly one timer is active. An unresolvable request is rejected with the list
    of active timers. Returns {success, cancelled, confirmation}.
  fields:
    uid:
      name: UID
      description: The unique id of the timer to cancel. Omit to resolve by label.
      required: false
      example: 1a2b3c4d
      selector:
        text:
    label:
      name: Label
      description: >-
        The timer's label as spoken by the user ("pasta"), matched
        case-insensitively against active timers. Omit when passing uid.
      required: false
      example: pasta
      selector:
        text:
