# Thin per-repo caller for the shared `@claude` pipeline.
#
# Event triggers and concurrency live in the caller because a reusable workflow
# cannot be the event entry point. Shared @claude command behavior is injected
# by btoddb/claude-pipeline at runtime; keep local repo guidance in AGENTS.md
# and ai-rules files.

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

concurrency:
  group: claude-${{ github.event.issue.number && 'iss' || 'pull' }}-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    uses: btoddb/claude-pipeline/.github/workflows/claude.yml@v1
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    with:
      maintainer: btoddb
      setup: python
      python-version: "3.14"
      install-command: pip install -r requirements.txt
      implement-allowed-tools: "Bash(scripts/lint),Bash(scripts/deploy-card)"
